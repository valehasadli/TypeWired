# Publishes to npm when a GitHub Release is published.
# The release tag must match package.json (tag v1.2.3 <-> version 1.2.3),
# so every npm version maps to a browsable tag in the repo.
#
# Publishing uses npm Trusted Publishing (OIDC) — no token secret. The
# trusted publisher must be configured on npmjs.com for this repo and
# this workflow filename (npm-publish.yml).

name: Publish to npm

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn test

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
          registry-url: https://registry.npmjs.org/
          cache: 'yarn'
      - name: Verify release tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}" >&2
            exit 1
          fi
      - run: yarn install --frozen-lockfile
      # npm (not yarn 1) is required for OIDC trusted publishing
      - run: npm publish
