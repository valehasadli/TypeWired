name: Bug report
description: Something resolves, disposes, or type-checks incorrectly
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: >
        A small self-contained snippet — token creation, registrations, and
        the resolve/dispose call that misbehaves.
      render: typescript
      placeholder: |
        const Db = createToken<Database>('Db');
        const container = new Container();
        container.register(Db, { ... });
        // ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: TypeWired version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node.js version, TypeScript version, bundler if relevant.
      placeholder: "Node 22.21, TypeScript 5.9, esbuild"
    validations:
      required: true
